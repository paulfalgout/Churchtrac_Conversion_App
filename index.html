<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversion Lab</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-core">
          <span class="brand-orbit"></span>
          <span class="brand-orbit brand-orbit-b"></span>
        </div>
        <div>
          <div class="brand-kicker">Freedom Village</div>
          <div class="brand-title">Conversion Lab</div>
        </div>
      </div>

      <div class="sidebar-section-label">Conversion Paths</div>

      <div class="menu-item active" id="menu-accounting" onclick="loadApp('Accounting', this)">
        <i class="fas fa-wave-square"></i>
        <span>Accounting</span>
      </div>
      <div class="menu-item" id="menu-giving" onclick="loadApp('Giving', this)">
        <i class="fas fa-hand-holding-usd"></i>
        <span>Giving</span>
      </div>
      <div class="menu-item" id="menu-tithely" onclick="loadApp('Tithe.ly', this)">
        <i class="fas fa-satellite-dish"></i>
        <span>Tithe.ly</span>
      </div>
      <div class="menu-item" id="menu-hanacard" onclick="loadApp('Hanacard', this)">
        <i class="fas fa-credit-card"></i>
        <span>Hanacard</span>
      </div>
      <div class="menu-item" id="menu-settings" onclick="loadApp('Settings', this)">
        <i class="fas fa-sliders"></i>
        <span>Settings</span>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-footer-label">Mode</div>
        <div class="sidebar-footer-copy">Quietly armed for strange little file rituals.</div>
      </div>
    </aside>

    <main class="workspace">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="ambient-grid"></div>

      <header class="workspace-topbar">
        <div>
          <div class="workspace-kicker" id="workspace-kicker">Futuristic Conversion Utility</div>
          <div class="workspace-title" id="workspace-title">Accounting</div>
        </div>
        <div class="workspace-status" id="workspace-status">Standing by</div>
      </header>

      <section id="content" class="workspace-content"></section>
    </main>
  </div>

  <script src="accounting.js"></script>
  <script src="giving.js"></script>
  <script src="settings.js"></script>
  <script src="exchange.js"></script>
  <script src="apps.js"></script>
</body>
</html>
